services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: brevly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "${PORT:-3333}:${PORT:-3333}"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
