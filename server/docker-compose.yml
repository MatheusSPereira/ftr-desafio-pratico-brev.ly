services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: brevly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker -d brevly"]
      interval: 2s
      timeout: 5s
      retries: 10

  server:
    build: .
    ports:
      - "${PORT:-3333}:${PORT:-3333}"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../web
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3333}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:-http://localhost:5173}
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - server

volumes:
  postgres_data:
